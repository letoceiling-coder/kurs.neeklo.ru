# kurs.neeklo.ru — Diplomat AI (генератор работ по ГОСТ)
# Порт приложения: 127.0.0.1:3210

upstream kurs_ai_app {
    server 127.0.0.1:3210;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name kurs.neeklo.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kurs.neeklo.ru;

    ssl_certificate     /etc/letsencrypt/live/kurs.neeklo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kurs.neeklo.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/kurs.neeklo.ru.access.log;
    error_log  /var/log/nginx/kurs.neeklo.ru.error.log;

    client_max_body_size 20m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/javascript;

    # SSE: потоковая генерация
    location = /api/generate {
        proxy_pass http://kurs_ai_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass http://kurs_ai_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
